app = "stockmarketsim"
primary_region = "fra" # Frankfurt (oder lhr, ams, etc.)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    [[services]]
  internal_port = 80
  protocol = "tcp"
  # ... restliche Config

